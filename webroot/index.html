<!DOCTYPE html>
<html>
<head>
    <title>Wi-Fi Config Switcher</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --background-start: #1a1a2e;
            --background-end: #16213e;
            --card-bg: rgba(255, 255, 255, 0.05);
            --text-primary: #e0e0e0;
            --text-secondary: #a0a0a0;
            --accent-perf: #03dac6;
            --accent-perf-dark: #018786;
            --accent-battery: #ff5252;
            --accent-battery-dark: #c51162;
            --accent-default: #42a5f5; /* A shade of blue for default */
            --accent-default-dark: #1976d2;
            --shadow: rgba(0, 0, 0, 0.5);
        }

        body {
            font-family: 'Roboto', sans-serif;
            background: linear-gradient(45deg, var(--background-start), var(--background-end));
            color: var(--text-primary);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        .container {
            text-align: center;
            background: var(--card-bg);
            padding: 2.5rem 3rem;
            border-radius: 15px;
            box-shadow: 0 10px 30px var(--shadow);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .container:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 40px var(--shadow);
        }

        h1 {
            font-weight: 700;
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
            background: -webkit-linear-gradient(45deg, var(--accent-perf), var(--accent-battery));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p {
            color: var(--text-secondary);
            font-weight: 300;
            margin-bottom: 2rem;
        }

        .button-group {
            margin-top: 1.5rem;
            display: flex;
            gap: 0.8rem; /* Reduced gap */
            justify-content: center;
            flex-wrap: wrap; /* Allow buttons to wrap */
        }

        button {
            padding: 0.8rem 1.2rem; /* Reduced padding */
            font-size: 0.9rem; /* Slightly smaller font */
            font-weight: 700;
            cursor: pointer;
            border: none;
            border-radius: 8px;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            color: #121212;
        }

        #perf-button {
            background-color: var(--accent-perf);
        }

        #perf-button:hover {
            background-color: var(--accent-perf-dark);
            box-shadow: 0 0 20px var(--accent-perf);
            transform: translateY(-3px);
        }

        #battery-button {
            background-color: var(--accent-battery);
        }

        #battery-button:hover {
            background-color: var(--accent-battery-dark);
            box-shadow: 0 0 20px var(--accent-battery);
            transform: translateY(-3px);
        }
        
        #default-button {
            background-color: var(--accent-default);
        }

        #default-button:hover {
            background-color: var(--accent-default-dark);
            box-shadow: 0 0 20px var(--accent-default);
            transform: translateY(-3px);
        }
        
        .icon {
            width: 24px;
            height: 24px;
        }

        #output {
            margin-top: 2rem;
            padding: 1rem;
            background-color: rgba(0, 0, 0, 0.3);
            border-radius: 8px;
            text-align: left;
            white-space: pre-wrap;
            font-family: monospace;
            min-height: 60px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s ease;
        }
        
        #status {
            margin-top: 1rem;
            font-size: 0.9rem;
            color: var(--text-secondary);
        }
        
        .status-dot {
            display: inline-block;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            margin-right: 8px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Wi-Fi Tuner</h1>
        <p>Instantly switch your Wi-Fi configuration.</p>
        <div id="status">
            Current Mode: <span id="current-mode">Unknown</span>
        </div>
        <div class="button-group">
            <button id="perf-button">
                <svg class="icon" viewBox="0 0 24 24" fill="currentColor"><path d="M21 10.12h-6.78l2.74-6.04-1.92-.88-3.43 7.54h-3.12L11.94 2 10 2.88 5.64 12H2v2h4.36l-4.22 9.28 1.92.88L7.5 16.62h3.12l-3.43 7.54 1.92.88L12.53 14h6.78l-2.74 6.04 1.92.88 3.43-7.54h3.12L18.06 22l1.92-.88L24.36 12H22v-2h-1v.01zM12.5 12H7.8l3.44-7.54L12.5 12z"/></svg>
                Performance
            </button>
            <button id="battery-button">
                <svg class="icon" viewBox="0 0 24 24" fill="currentColor"><path d="M15.67 4H14V2h-4v2H8.33C7.6 4 7 4.6 7 5.33v15.33C7 21.4 7.6 22 8.33 22h7.33c.74 0 1.34-.6 1.34-1.33V5.33C17 4.6 16.4 4 15.67 4z"/></svg>
                Battery
            </button>
            <button id="default-button">
                <svg class="icon" viewBox="0 0 24 24" fill="currentColor"><path d="M17.65 6.35C16.2 4.9 14.21 4 12 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08c-.82 2.33-3.04 4-5.65 4-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z"/></svg>
                Default
            </button>
        </div>
        <div id="output">
            <p>Status will be shown here...</p>
        </div>
    </div>

    <script>
    // NOTE: This code uses the SYNCHRONOUS ksu.exec provided by the KernelSU WebUI bridge.

    const perfButton = document.getElementById('perf-button');
    const batteryButton = document.getElementById('battery-button');
    const defaultButton = document.getElementById('default-button');
    const outputDiv = document.getElementById('output');
    const currentModeSpan = document.getElementById('current-mode');
    const statusDiv = document.getElementById('status');

    // MODULE ID check: Based on module.prop, the ID is 'wifi_tweaks'.
    const scriptPath = '/data/adb/modules/wifi_tweaks/common/switch_mode.sh'; 

    // Function to set the UI state (text and color)
    function setUIMode(mode) {
        const existingDot = statusDiv.querySelector('.status-dot');
        if (existingDot) {
            existingDot.remove();
        }

        const dot = document.createElement('span');
        dot.className = 'status-dot';

        let modeText = 'Unknown';
        let dotColor = 'var(--text-secondary)';

        if (mode.includes('perf')) {
            modeText = 'Performance';
            dotColor = 'var(--accent-perf)';
        } else if (mode.includes('battery')) {
            modeText = 'Battery';
            dotColor = 'var(--accent-battery)';
        } else if (mode.includes('default')) {
            modeText = 'Default';
            dotColor = 'var(--accent-default)';
        }

        currentModeSpan.textContent = modeText;
        dot.style.backgroundColor = dotColor;
        statusDiv.prepend(dot);
    }

    // Function to lock/unlock the UI during operations
    function setUILocked(locked) {
        perfButton.disabled = locked;
        batteryButton.disabled = locked;
        defaultButton.disabled = locked;
        outputDiv.style.opacity = locked ? 0.6 : 1;
        perfButton.style.cursor = locked ? 'wait' : 'pointer';
        batteryButton.style.cursor = locked ? 'wait' : 'pointer';
        defaultButton.style.cursor = locked ? 'wait' : 'pointer';
    }

    // Generic function to run a shell command (Synchronous call)
    function runCommand(command) {
        // ksu.exec is a SYNCHRONOUS global function
        const result = ksu.exec(command);

        // Check if the result is a string (indicating direct stdout on success)
        if (typeof result === 'string') {
            return result; // Assume success, return stdout directly
        }

        if (result && typeof result.errno === 'number') {
            if (result.errno === 0) {
                // Return script's stdout on success
                return result.stdout;
            } else {
                // Throw an error if the script exited non-zero
                throw new Error(`Command failed with errno ${result.errno}: ${result.stdout || result.stderr || 'No output'}`);
            }
        } else {
            // Fallback for unexpected result format
            throw new Error(`Unexpected response from ksu.exec. Raw result: ${JSON.stringify(result)}`);
        }
    }

    // Function to get the current status on page load (Synchronous)
    function getInitialStatus() {
        outputDiv.textContent = 'Checking current Wi-Fi mode...';
        setUILocked(true);
        try {
            // No 'await' needed here
            const command = `${scriptPath} status`; 
            const result = runCommand(command);
            const initialMode = result.trim();
            
            setUIMode(initialMode);
            outputDiv.textContent = `Current mode is ${currentModeSpan.textContent}. Ready.`;
        } catch (error) {
            outputDiv.textContent = `Error checking status: ${error.message}`;
            setUIMode('unknown');
        } finally {
            setUILocked(false);
        }
    }

    // Function to handle the switch process (Synchronous)
    function runSwitch(mode) {
        const modeName = mode.charAt(0).toUpperCase() + mode.slice(1);
        outputDiv.textContent = `Switching to ${modeName} mode...`;
        setUILocked(true);
        
        try {
            // First, run the switch command. No 'await'.
            const switchOutput = runCommand(`${scriptPath} ${mode}`);
            outputDiv.textContent = switchOutput; // Display the success message from the script
            
            // After switching, re-verify the status directly to confirm. No 'await'.
            const statusResult = runCommand(`${scriptPath} status`);
            const newMode = statusResult.trim();
            
            setUIMode(newMode);
            outputDiv.textContent = `Successfully switched to ${newMode.charAt(0).toUpperCase() + newMode.slice(1)} mode.`;

        } catch (error) {
            outputDiv.textContent = `Error switching mode: ${error.message}`;
            // If the switch failed, check the status immediately. No 'await'.
            getInitialStatus();
        } finally {
            setUILocked(false);
        }
    }

    // Event Listeners: Call the synchronous functions directly
    document.addEventListener('DOMContentLoaded', getInitialStatus);
    perfButton.addEventListener('click', () => runSwitch('perf'));
    batteryButton.addEventListener('click', () => runSwitch('battery'));
    defaultButton.addEventListener('click', () => runSwitch('default'));
   </script>

</body>
</html>
